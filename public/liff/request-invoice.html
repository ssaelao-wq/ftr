<!--
`public/liff/request-invoice.html`:
Redesigned LIFF Request Full Tax Invoice page with 2-step flow.
Includes checking step via GET /check-invoice and delivery popup with Email/LINE.
Matches missing-info.html style system and UX.
-->

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ขอใบกำกับภาษีฉบับเต็ม</title>
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           CSS VARIABLES & RESET
        ============================================================ */
        :root {
            --green: #00B900;
            --green-dark: #008f00;
            --green-light: #e6f9e6;
            --green-bg: linear-gradient(150deg, #00B900 0%, #007a00 100%);
            --grey-100: #f8f9fa;
            --grey-200: #e9ecef;
            --grey-300: #dee2e6;
            --grey-400: #ced4da;
            --grey-500: #adb5bd;
            --grey-600: #6c757d;
            --grey-700: #495057;
            --grey-800: #343a40;
            --text: #1a1a2e;
            --text-light: #6c757d;
            --white: #ffffff;
            --danger: #dc3545;
            --danger-light: #fff5f5;
            --warning: #ff9800;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--grey-100);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.5;
        }

        /* ============================================================
           PAGE HEADER
        ============================================================ */
        .page-header {
            background: var(--green-bg);
            color: white;
            padding: 16px 16px 24px;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: -20px; left: -20px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .header-icon {
            font-size: 2rem;
            margin-bottom: 0;
            display: block;
        }

        .header-text {
            flex: 1;
        }

        .page-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .page-header p {
            font-size: 0.82rem;
            opacity: 0.85;
            font-weight: 400;
            margin-bottom: 0;
        }

        /* ============================================================
           MAIN CARD
        ============================================================ */
        .main-card {
            background: white;
            margin: -16px 12px 16px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            position: relative;
        }

        .card-body {
            padding: 20px 16px 16px;
        }

        /* ============================================================
           FORM FIELDS
        ============================================================ */
        .field-group {
            margin-bottom: 14px;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--grey-700);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .field-label .req {
            color: var(--danger);
            font-size: 0.9em;
        }

        .field-input {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid var(--grey-300);
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-family: inherit;
            color: var(--text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .field-input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(0,185,0,0.12);
        }

        .field-input:disabled {
            background: var(--grey-100);
            border-color: var(--grey-200);
            color: var(--grey-500);
            cursor: not-allowed;
        }

        /* ============================================================
           BOTTOM ACTION BAR
        ============================================================ */
        .action-bar {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid var(--grey-200);
            background: white;
        }

        .btn {
            flex: 1;
            padding: 13px 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-ok {
            background: var(--green);
            color: white;
        }

        .btn-ok:hover:not(:disabled) { background: var(--green-dark); }

        .btn-ok:disabled {
            background: var(--grey-300);
            color: var(--grey-500);
            cursor: not-allowed;
        }

        .btn-cancel {
            background: var(--grey-200);
            color: var(--grey-700);
            flex: 0.55;
        }

        .btn-cancel:hover { background: var(--grey-300); }

        /* ============================================================
           STATUS BANNER
        ============================================================ */
        .status-banner {
            display: none;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 14px;
        }

        .status-banner.error {
            background: var(--danger-light);
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        /* Checking indicator */
        .checking-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--grey-600);
            padding: 4px 0;
            justify-content: center;
        }

        .mini-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(0,185,0,0.3);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           BOTTOM SHEET MODAL
        ============================================================ */
        .overlay-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 200;
            backdrop-filter: blur(3px);
            animation: fadeIn 0.2s ease;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            z-index: 201;
            padding: 24px 20px 32px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
        }

        .bottom-sheet.open { transform: translateY(0); }

        .sheet-drag-handle { width: 36px; height: 4px; background: var(--grey-300); border-radius: 2px; margin: 0 auto 18px; }

        .bottom-sheet h2 {
            font-size: 1.05rem;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            margin-bottom: 6px;
        }

        .bottom-sheet .sheet-sub {
            font-size: 0.8rem;
            text-align: center;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        /* Email block */
        .email-block {
            background: var(--grey-100);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 12px;
        }

        .email-block label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--grey-700);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 7px;
        }

        .email-input-row {
            display: flex;
            gap: 8px;
        }

        .email-input-row .field-input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            font-size: 0.9rem;
        }

        .btn-send-email {
            padding: 10px 18px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-send-email:active { transform: scale(0.96); }
        .btn-send-email:hover { background: var(--green-dark); }

        .sheet-or {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 14px 0;
        }

        .sheet-or .line { flex: 1; height: 1px; background: var(--grey-200); }
        .sheet-or span { font-size: 0.75rem; color: var(--grey-500); font-weight: 600; }

        .btn-send-line {
            width: 100%;
            padding: 14px;
            background: #00B900;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 10px;
        }

        .btn-send-line:active { transform: scale(0.97); }
        .btn-send-line:hover { background: var(--green-dark); }

        .btn-sheet-cancel {
            width: 100%;
            padding: 12px;
            background: var(--grey-100);
            color: var(--grey-600);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-sheet-cancel:hover { background: var(--grey-200); }

        /* ============================================================
           TOAST NOTIFICATION
        ============================================================ */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(30,30,30,0.92);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 500;
            max-width: calc(100vw - 32px);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: rgba(0, 130, 0, 0.95); }
        .toast.error { background: rgba(185, 0, 0, 0.95); }

        /* ============================================================
           LOADING OVERLAY
        ============================================================ */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.75);
            z-index: 400;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.show { display: flex; }

        .big-spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(0,185,0,0.25);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loading-overlay p {
            font-size: 0.85rem;
            color: var(--grey-600);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ============================================================
           NEW SEARCH & CHECKLIST STYLES
        ============================================================ */
        .search-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .search-input-wrapper .field-input {
            flex: 1;
        }

        .btn-search {
            padding: 10px 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-search:active { transform: scale(0.96); }
        .btn-search:hover { background: var(--green-dark); }
        .btn-search:disabled { background: var(--grey-300); color: var(--grey-500); cursor: not-allowed; }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: var(--grey-100);
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
        }

        .checklist-item:hover {
            background: var(--grey-200);
        }

        .checklist-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--green);
            cursor: pointer;
        }

        .checklist-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .checklist-item-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text);
        }

        .checklist-item-subtitle {
            font-size: 0.78rem;
            color: var(--grey-600);
        }
    </style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="header-content">
        <span class="header-icon">🧾</span>
        <div class="header-text">
            <h1>ขอใบกำกับภาษีฉบับเต็ม</h1>
            <p>ระบุหมายเลขเพื่อตรวจสอบและขอเอกสาร</p>
        </div>
    </div>
</div>

<!-- MAIN CARD -->
<div class="main-card">
    <div class="card-body">
        <!-- Error Banner -->
        <div class="status-banner error" id="statusBanner"></div>

        <!-- Tax ID -->
        <div class="field-group">
            <div class="field-label">Tax ID (เลขประจำตัวผู้เสียภาษี) <span class="req">*</span></div>
            <div class="search-input-wrapper">
                <input type="text" id="taxId" class="field-input" placeholder="13 หลัก"
                       maxlength="13" inputmode="numeric" pattern="\d{13}"
                       autocomplete="off" autocorrect="off">
                <button class="btn-search" id="btnSearch">🔍 ค้นหา</button>
            </div>
        </div>

        <!-- Tax Record ID -->
        <div class="field-group">
            <div class="field-label">Tax Record ID <span class="req">*</span></div>
            <input type="text" id="taxRecId" class="field-input" placeholder="เช่น RF2605-00123"
                   autocomplete="off" autocorrect="off" spellcheck="false">
        </div>

        <!-- Checking inline spinner -->
        <div class="checking-indicator" id="checkingIndicator">
            <div class="mini-spinner"></div>
            <span>กำลังตรวจสอบข้อมูล...</span>
        </div>
    </div>

    <!-- Actions -->
    <div class="action-bar">
        <button class="btn btn-ok" id="btnOk">ตกลง</button>
        <button class="btn btn-cancel" id="btnCancel">ยกเลิก</button>
    </div>
</div>

<!-- BOTTOM SHEET MODAL (Invoice Selection Checklist) -->
<div class="overlay-backdrop" id="checklistBackdrop"></div>
<div class="bottom-sheet" id="checklistSheet">
    <div class="sheet-drag-handle"></div>
    <h2>เลือกใบกำกับภาษี</h2>
    <p class="sheet-sub">เลือกใบกำกับภาษีในรอบ 14 วันที่ต้องการขอ</p>

    <!-- Checklist Container -->
    <div id="checklistContainer" style="max-height: 250px; overflow-y: auto; margin-bottom: 16px; padding: 0 4px;">
        <!-- Checkboxes dynamically rendered here -->
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="btn btn-ok" id="btnChecklistOk">ตกลง</button>
        <button class="btn btn-cancel" id="btnChecklistCancel">ยกเลิก</button>
    </div>
</div>

<!-- BOTTOM SHEET MODAL (Delivery Options) -->
<div class="overlay-backdrop" id="deliveryBackdrop"></div>
<div class="bottom-sheet" id="deliverySheet">
    <div class="sheet-drag-handle"></div>
    <h2>ส่งใบกำกับภาษี</h2>
    <p class="sheet-sub" id="sheetCustomerName">—</p>

    <!-- Email Section -->
    <div class="email-block">
        <label for="emailInput">📧 ส่งทางอีเมล</label>
        <div class="email-input-row">
            <input type="email" id="emailInput" class="field-input" placeholder="ระบุอีเมลผู้รับ PDF" autocomplete="off">
            <button class="btn-send-email" id="btnSendEmail">📨 ส่ง</button>
        </div>
    </div>

    <div class="sheet-or">
        <div class="line"></div>
        <span>หรือ</span>
        <div class="line"></div>
    </div>

    <!-- LINE Section -->
    <button class="btn-send-line" id="btnSendLine">
        <span>💚 ส่งทาง LINE</span>
    </button>

    <button class="btn-sheet-cancel" id="btnSheetCancel">ยกเลิก</button>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="big-spinner"></div>
    <p>กำลังดำเนินการ...</p>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast"></div>

<!-- LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    // State machine configuration
    const STATE = {
        INITIAL: 'INITIAL',
        CHECKING: 'CHECKING',
        ERROR: 'ERROR',
        POPUP_OPEN: 'POPUP_OPEN',
        SUBMITTING: 'SUBMITTING',
        SENT: 'SENT'
    };

    let currentState = STATE.INITIAL;
    let lineUserId = null;
    let lineDisplayName = null;
    let pdfState = null; // 'ready' or 'no_pdf'
    let currentCustomerName = '';

    // Initialize LIFF
    async function initializeLiff() {
        try {
            await liff.init({ liffId: "2010196890-kJW56aX3" }); // Your active LIFF ID
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                lineDisplayName = profile.displayName;
                console.log("LIFF initialized. Line User ID:", lineUserId, "Name:", lineDisplayName);
            }
        } catch (err) {
            console.error('LIFF Initialization failed', err);
            showToast('เชื่อมต่อ LINE ล้มเหลว', 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', initializeLiff);

    // Dom Elements
    const elements = {
        taxRecId: document.getElementById('taxRecId'),
        taxId: document.getElementById('taxId'),
        statusBanner: document.getElementById('statusBanner'),
        checkingIndicator: document.getElementById('checkingIndicator'),
        btnOk: document.getElementById('btnOk'),
        btnCancel: document.getElementById('btnCancel'),
        deliveryBackdrop: document.getElementById('deliveryBackdrop'),
        deliverySheet: document.getElementById('deliverySheet'),
        sheetCustomerName: document.getElementById('sheetCustomerName'),
        emailInput: document.getElementById('emailInput'),
        btnSendEmail: document.getElementById('btnSendEmail'),
        btnSendLine: document.getElementById('btnSendLine'),
        btnSheetCancel: document.getElementById('btnSheetCancel'),
        loadingOverlay: document.getElementById('loadingOverlay'),
        toast: document.getElementById('toast'),
        
        // New elements
        btnSearch: document.getElementById('btnSearch'),
        checklistBackdrop: document.getElementById('checklistBackdrop'),
        checklistSheet: document.getElementById('checklistSheet'),
        checklistContainer: document.getElementById('checklistContainer'),
        btnChecklistOk: document.getElementById('btnChecklistOk'),
        btnChecklistCancel: document.getElementById('btnChecklistCancel')
    };

    // Toast helper
    let toastTimeout;
    function showToast(message, type = 'success') {
        clearTimeout(toastTimeout);
        elements.toast.innerText = message;
        elements.toast.className = `toast show ${type}`;
        toastTimeout = setTimeout(() => {
            elements.toast.classList.remove('show');
        }, 4000); // 4 seconds for warnings so user can read excluded IDs
    }

    // State updates
    function updateState(newState, data = {}) {
        currentState = newState;
        
        switch (newState) {
            case STATE.INITIAL:
                elements.taxRecId.disabled = false;
                elements.taxId.disabled = false;
                elements.btnSearch.disabled = false;
                elements.btnOk.disabled = false;
                elements.btnCancel.disabled = false;
                elements.checkingIndicator.style.display = 'none';
                elements.statusBanner.style.display = 'none';
                
                // Close Sheets
                elements.deliveryBackdrop.style.display = 'none';
                elements.deliverySheet.classList.remove('open');
                elements.checklistBackdrop.style.display = 'none';
                elements.checklistSheet.classList.remove('open');
                elements.loadingOverlay.classList.remove('show');
                break;

            case STATE.CHECKING:
                elements.taxRecId.disabled = true;
                elements.taxId.disabled = true;
                elements.btnSearch.disabled = true;
                elements.btnOk.disabled = true;
                elements.btnCancel.disabled = true;
                elements.checkingIndicator.style.display = 'flex';
                elements.statusBanner.style.display = 'none';
                elements.loadingOverlay.classList.remove('show');
                break;

            case STATE.ERROR:
                elements.taxRecId.disabled = false;
                elements.taxId.disabled = false;
                elements.btnSearch.disabled = false;
                elements.btnOk.disabled = false;
                elements.btnCancel.disabled = false;
                elements.checkingIndicator.style.display = 'none';
                if (data.errorMessage) {
                    elements.statusBanner.innerText = data.errorMessage;
                    elements.statusBanner.style.display = 'block';
                }
                break;

            case STATE.POPUP_OPEN:
                elements.checkingIndicator.style.display = 'none';
                elements.statusBanner.style.display = 'none';
                
                // Setup Sheet info
                elements.sheetCustomerName.innerText = `ผู้เสียภาษี: ${data.customerName || '—'}`;
                elements.emailInput.value = '';
                
                // Slide up sheet
                elements.deliveryBackdrop.style.display = 'block';
                elements.deliverySheet.classList.add('open');
                elements.loadingOverlay.classList.remove('show');
                break;

            case STATE.SUBMITTING:
                elements.deliveryBackdrop.style.display = 'none';
                elements.deliverySheet.classList.remove('open');
                elements.loadingOverlay.classList.add('show');
                break;

            case STATE.SENT:
                elements.loadingOverlay.classList.remove('show');
                break;
        }
    }

    // Search action
    async function searchInvoices() {
        const taxIdVal = elements.taxId.value.trim();
        if (!taxIdVal) {
            showToast('กรุณากรอก Tax ID', 'error');
            return;
        }
        if (taxIdVal.length !== 13 || !/^\d+$/.test(taxIdVal)) {
            showToast('Tax ID ต้องเป็นตัวเลข 13 หลัก', 'error');
            return;
        }

        elements.btnSearch.disabled = true;
        elements.btnSearch.innerText = 'กำลังค้นหา...';

        try {
            const res = await fetch(`/api/customer/search-invoices?tax_id=${encodeURIComponent(taxIdVal)}`);
            const data = await res.json();

            if (res.ok && data.success) {
                const invoices = data.invoices || [];
                if (invoices.length === 0) {
                    showToast('ไม่พบใบกำกับภาษีของ Tax ID นี้ในรอบ 14 วัน', 'error');
                } else {
                    renderChecklist(invoices);
                    openChecklist();
                }
            } else {
                showToast(data.message || 'เกิดข้อผิดพลาดในการค้นหา', 'error');
            }
        } catch (err) {
            console.error(err);
            showToast('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            elements.btnSearch.disabled = false;
            elements.btnSearch.innerText = '🔍 ค้นหา';
        }
    }

    function renderChecklist(invoices) {
        const container = elements.checklistContainer;
        container.innerHTML = '';

        invoices.forEach(inv => {
            const dateStr = inv.service_date ? new Date(inv.service_date).toLocaleDateString('th-TH') : '-';
            const item = document.createElement('div');
            item.className = 'checklist-item';
            item.innerHTML = `
                <input type="checkbox" value="${inv.tax_rec_id}">
                <div class="checklist-item-details">
                    <span class="checklist-item-title">${inv.tax_rec_id}</span>
                    <span class="checklist-item-subtitle">วันที่บริการ: ${dateStr}</span>
                </div>
            `;
            item.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const cb = item.querySelector('input[type="checkbox"]');
                    cb.checked = !cb.checked;
                }
            });
            container.appendChild(item);
        });
    }

    function openChecklist() {
        elements.checklistBackdrop.style.display = 'block';
        elements.checklistSheet.classList.add('open');
    }

    function closeChecklist() {
        elements.checklistBackdrop.style.display = 'none';
        elements.checklistSheet.classList.remove('open');
    }

    function applyChecklistSelection() {
        const checkedBoxes = elements.checklistContainer.querySelectorAll('input[type="checkbox"]:checked');
        const selectedIds = Array.from(checkedBoxes).map(cb => cb.value);
        if (selectedIds.length === 0) {
            showToast('กรุณาเลือกใบกำกับภาษีอย่างน้อย 1 รายการ', 'error');
            return;
        }
        elements.taxRecId.value = selectedIds.join(',');
        closeChecklist();
    }

    // Handle verification
    async function checkInvoice() {
        const taxRecIdVal = elements.taxRecId.value.trim();
        const taxIdVal = elements.taxId.value.trim();

        if (!taxRecIdVal) {
            showToast('กรุณากรอก Tax Record ID', 'error');
            return;
        }
        if (!taxIdVal) {
            showToast('กรุณากรอก Tax ID', 'error');
            return;
        }
        if (taxIdVal.length !== 13 || !/^\d+$/.test(taxIdVal)) {
            showToast('Tax ID ต้องเป็นตัวเลข 13 หลัก', 'error');
            return;
        }

        updateState(STATE.CHECKING);

        try {
            const res = await fetch(`/api/customer/check-invoice?tax_rec_id=${encodeURIComponent(taxRecIdVal)}&tax_id=${encodeURIComponent(taxIdVal)}`);
            const data = await res.json();

            if (res.ok && data.success) {
                pdfState = data.pdf_state;
                currentCustomerName = data.customer_name;
                
                if (data.excluded && data.excluded.length > 0) {
                    showToast(`ข้ามเอกสารที่ไม่ตรงเงื่อนไข: ${data.excluded.join(', ')}`, 'warning');
                    elements.taxRecId.value = data.valid.join(',');
                }

                updateState(STATE.POPUP_OPEN, { customerName: data.customer_name });
            } else {
                updateState(STATE.ERROR, { errorMessage: data.message || 'เกิดข้อผิดพลาดในการตรวจสอบ' });
            }
        } catch (err) {
            console.error(err);
            updateState(STATE.ERROR, { errorMessage: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง' });
        }
    }

    // Submit Request
    async function submitRequest(sendMethod, emailSending = '') {
        const taxRecIdVal = elements.taxRecId.value.trim();
        const taxIdVal = elements.taxId.value.trim();

        updateState(STATE.SUBMITTING);

        const payload = {
            line_user_id: lineUserId || 'mock_user_id_for_dev',
            line_display_name: lineDisplayName || 'mock_user_name',
            tax_rec_id: taxRecIdVal,
            tax_id: taxIdVal,
            send_method: sendMethod,
            email_sending: emailSending
        };

        try {
            const res = await fetch('/api/customer/request-invoice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (res.ok && data.success) {
                updateState(STATE.SENT);
                showToast(data.message || 'ส่งข้อมูลเรียบร้อยแล้ว', 'success');
                setTimeout(() => {
                    if (typeof liff !== 'undefined' && liff.closeWindow) {
                        liff.closeWindow();
                    }
                }, 3000);
            } else {
                updateState(STATE.POPUP_OPEN, { customerName: currentCustomerName });
                showToast(data.message || 'เกิดข้อผิดพลาดในการส่งข้อมูล', 'error');
            }
        } catch (err) {
            console.error(err);
            updateState(STATE.POPUP_OPEN, { customerName: currentCustomerName });
            showToast('เกิดข้อผิดพลาดทางเครือข่าย', 'error');
        }
    }

    // Event Listeners
    elements.btnOk.addEventListener('click', checkInvoice);
    
    elements.btnCancel.addEventListener('click', () => {
        try { liff.closeWindow(); } catch (e) {}
    });

    elements.btnSheetCancel.addEventListener('click', () => {
        updateState(STATE.INITIAL);
    });

    elements.deliveryBackdrop.addEventListener('click', () => {
        updateState(STATE.INITIAL);
    });

    // Search Triggers
    elements.btnSearch.addEventListener('click', searchInvoices);

    // Checklist triggers
    elements.btnChecklistOk.addEventListener('click', applyChecklistSelection);
    elements.btnChecklistCancel.addEventListener('click', () => {
        closeChecklist();
        elements.taxId.focus();
    });
    elements.checklistBackdrop.addEventListener('click', () => {
        closeChecklist();
        elements.taxId.focus();
    });

    // Send Email Trigger
    elements.btnSendEmail.addEventListener('click', () => {
        const email = elements.emailInput.value.trim();
        if (!email) {
            showToast('กรุณากรอกอีเมล', 'error');
            return;
        }
        // Simple regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showToast('กรุณากรอกรูปแบบอีเมลให้ถูกต้อง', 'error');
            return;
        }
        submitRequest('email', email);
    });

    // Send LINE Trigger
    elements.btnSendLine.addEventListener('click', () => {
        if (!lineUserId) {
            showToast('ไม่พบข้อมูลผู้ใช้ LINE กรุณาตรวจสอบสิทธิ์การใช้งาน', 'error');
            return;
        }
        submitRequest('line');
    });
</script>
</body>
</html>
