<!--
`public/liff/missing-info.html` & `public/liff/request-invoice.html`:
Activated the `DOMContentLoaded` event listener so that the LIFF SDK initiates dynamically
on load to fetch the actual `lineUserId` from LINE.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Tax Invoice - FTR</title>
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00B900; /* Line Green */
            --secondary-color: #009900;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-radius: 12px;
            --input-border: #dcdcdc;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2f1 0%, #ffffff 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #444;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background-color: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 185, 0, 0.15);
            background-color: #fff;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,185,0,0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .message-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Request Tax Invoice</h1>
            <p>We will generate and send the Full Tax Invoice to your email address.</p>
        </div>

        <form id="requestInvoiceForm">
            <div class="form-group">
                <label for="tax_rec_id">Tax Record ID</label>
                <input type="text" id="tax_rec_id" class="form-control" placeholder="e.g. RF2605-00589" required>
            </div>
            <div class="form-group">
                <label for="tax_id">Tax ID</label>
                <input type="text" id="tax_id" class="form-control" placeholder="13 digits" pattern="\d{13}" title="Please enter exactly 13 digits" required>
            </div>
            <div class="form-group">
                <label for="email_sending">Email Address</label>
                <input type="email" id="email_sending" class="form-control" placeholder="Email to receive PDF" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send to Email</button>
        </form>

        <div class="loader" id="loader" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 10px; font-size: 0.9rem; color: #666;">Processing request...</p>
        </div>

        <div id="message-box"></div>
    </div>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        let lineUserId = null;

        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010196890-kJW56aX3" }); // Your active LIFF ID
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId;
                    console.log("LIFF initialized. Line User ID:", lineUserId);
                }
            } catch (err) {
                console.error('LIFF Initialization failed', err);
            }
        }

        // Active listener to run LIFF Initialization on load
        document.addEventListener('DOMContentLoaded', initializeLiff);

        document.getElementById('requestInvoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const msgBox = document.getElementById('message-box');
            
            btn.style.display = 'none';
            loader.style.display = 'block';
            msgBox.style.display = 'none';

            const payload = {
                line_user_id: lineUserId || 'mock_user_id_for_dev',
                tax_rec_id: document.getElementById('tax_rec_id').value,
                tax_id: document.getElementById('tax_id').value,
                email_sending: document.getElementById('email_sending').value
            };

            try {
                const response = await fetch('/api/customer/request-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                loader.style.display = 'none';
                msgBox.style.display = 'block';
                
                if (response.ok) {
                    msgBox.className = 'message-success';
                    msgBox.innerText = 'Success! The Full Tax Invoice has been generated and sent to your email.';
                    // Optional: Close LIFF window after success
                    setTimeout(() => liff.closeWindow(), 3000);
                } else {
                    msgBox.className = 'message-error';
                    msgBox.innerText = data.message || 'An error occurred. Please try again.';
                    btn.style.display = 'block';
                }
            } catch (err) {
                loader.style.display = 'none';
                msgBox.style.display = 'block';
                msgBox.className = 'message-error';
                msgBox.innerText = 'Network error. Please try again.';
                btn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
